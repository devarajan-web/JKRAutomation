name: Run Automation

on:
  schedule:
    - cron: '0 4 * * *'   # Runs daily 9:30 AM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Script
      run: python your_script.py
